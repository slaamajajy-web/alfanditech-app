<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlfandiTech App</title>
    <style>
        body { background-color: #001f3f; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .logo { font-size: 3rem; font-weight: bold; margin-bottom: 10px; color: #007bff; }
        .tagline { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8; }
        .btn { background-color: #007bff; color: white; padding: 15px 35px; border: none; border-radius: 50px; text-decoration: none; font-size: 1.1rem; font-weight: bold; box-shadow: 0 4px 15px rgba(0,123,255,0.3); transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="logo">AlfandiTech</div>
    <div class="tagline">تطبيقك التقني الشخصي</div>
    <a href="https://alfanditech.wordpress.com" class="btn">دخول المدونة</a>
</body>
</html>
